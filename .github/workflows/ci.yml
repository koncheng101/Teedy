name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. 【重点修改】安装系统级依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 补全了 PDF 和图片处理所需的库
          sudo apt-get install -y \
            tesseract-ocr libtesseract-dev \
            ffmpeg mediainfo \
            poppler-utils \
            imagemagick

      # 4. Maven 构建 & 生成 JavaDoc
      - name: Build with Maven
        run: |
          mvn -B clean package javadoc:javadoc \
            -DskipTests=false \
            -Dmaven.test.failure.ignore=true \
            -Dmaven.javadoc.failOnError=false

      # 5. 上传构建产物 (Jar/War)
      - name: Upload JAR Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teedy-jars
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 5

      # 6. 上传测试报告
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.txt
            **/target/surefire-reports/*.xml
          retention-days: 5

      # 7. 上传 JavaDoc
      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: '**/target/site/apidocs/'
          retention-days: 5

name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 11 (Teedy 原生支持最好)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # 3. 安装依赖 (修复 OCR 和 媒体处理报错)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev ffmpeg mediainfo poppler-utils

      # 4. 构建与生成文档
      - name: Build with Maven
        run: |
          # 使用绝对路径调用 mvn 以防万一，虽然 setup-java 通常会自动配置好
          mvn -B clean package javadoc:javadoc \
            -Dmaven.javadoc.failOnError=false \
            -Dcheckstyle.skip=true \
            -Dpmd.skip=true
          # 注意：如果不需要 PMD/Checkstyle 检查，加上 skip 可以加快速度并减少报错

      # 5. 上传 JAR/WAR
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teedy-build-output
          path: |
            **/target/*.jar
            **/target/*.war

      # 6. 上传测试报告
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'

      # 7. 上传 JavaDoc
      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: '**/target/site/apidocs/'

name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. 【重要】安装系统级依赖 (修复测试失败的关键)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 安装 OCR, PDF处理, 视频处理, 图片处理依赖
          sudo apt-get install -y \
            tesseract-ocr libtesseract-dev \
            poppler-utils \
            ffmpeg mediainfo \
            imagemagick

      # 4. Maven 构建 + 生成 JavaDoc
      - name: Build and Generate Javadoc
        run: |
          # aggregate 会将多模块文档合并，适合 Teedy 这种结构
          mvn -B clean package javadoc:aggregate \
            -DskipTests=false \
            -Dmaven.test.failure.ignore=true \
            -Dmaven.javadoc.failOnError=false

      # 5. 上传构建产物 (Jar/War)
      - name: Upload JAR Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teedy-jars
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 5

      # 6. 上传测试报告
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.txt
            **/target/surefire-reports/*.xml
          retention-days: 5

      # 7. 上传 JavaDoc
      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-html
          path: target/site/apidocs/
          retention-days: 5

name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Dependencies (Tesseract & FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr libtesseract-dev ffmpeg mediainfo

    - name: Build with Maven (Compile, PMD, Test)
      run: |
        mvn -B clean compile pmd:pmd test \
          -Dmaven.javadoc.doclint=none \
          -Dmaven.test.failure.ignore=true

    - name: Generate Javadoc
      run: |
        mvn javadoc:javadoc -Dmaven.javadoc.doclint=none || true

    - name: Upload JAR Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: teedy-jars
        path: |
          **/target/*.jar
          **/target/*.war

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          **/target/surefire-reports/*.xml
          **/target/site/surefire-reports/*.html

    - name: Upload Javadoc
      uses: actions/upload-artifact@v4
      with:
        name: javadoc
        path: **/target/site/apidocs/**

name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 环境 (Teedy 需要 Java)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. 安装系统依赖 (解决 OCR 测试失败的关键步骤)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev ffmpeg mediainfo

      # 4. Maven 构建：编译 + PMD检查 + 单元测试
      # 注意：使用 test.failure.ignore=true 防止单个测试失败导致整个流水线中断，以便生成报告
      - name: Build & Test (Maven)
        run: mvn -B clean verify pmd:pmd -Dmaven.javadoc.skip=true -Dtest.failure.ignore=true

      # 5. 单独生成 JavaDoc (避免构建阶段因文档注释错误而失败)
      - name: Generate Javadoc
        run: mvn javadoc:javadoc -Dmaven.javadoc.doclint=none || true

      # 6. 上传构建产物 (Jar/War包)
      - name: Upload Artifacts (Jars)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teedy-build-packages
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 5

      # 7. 上传测试报告 (HTML格式方便查看)
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-html
          path: '**/target/surefire-reports/*.html'
          retention-days: 5

      # 8. 上传 JavaDoc 文档
      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-site
          path: '**/target/site/apidocs/'
          retention-days: 5

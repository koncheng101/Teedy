name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 11 (关键修改：Teedy 对高版本 JDK 支持不好，换回 11)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # 3. 安装系统级依赖 (保持不变，修复 OCR 问题)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev ffmpeg mediainfo poppler-utils

      # 4. Maven 构建 (核心修改点)
      - name: Build with Maven
        run: |
          mvn -B clean package javadoc:javadoc \
            -DskipTests=false \
            -Dmaven.test.failure.ignore=true \
            -Dmaven.javadoc.failOnError=false \
            -Dorg.slf4j.simpleLogger.defaultLogLevel=warn \
            -Xmx1024m -Xms512m
        env:
          MAVEN_OPTS: "-Xmx1024m -Xms512m"
        # 解释：
        # -Dmaven.test.failure.ignore=true: 即使测试失败也不要停止流水线，为了拿报告
        # -Dmaven.javadoc.failOnError=false: 即使文档生成有警告也不要报错
        # MAVEN_OPTS: 限制内存使用，防止 GitHub Actions 内存溢出导致 Exit Code 1

      # 5. 上传构建产物 (Jar/War)
      - name: Upload JAR Artifacts
        if: always() # 即使前面步骤失败也尝试上传
        uses: actions/upload-artifact@v4
        with:
          name: teedy-jars
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 5

      # 6. 上传测试报告
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.txt
            **/target/surefire-reports/*.xml
          retention-days: 5

      # 7. 上传 JavaDoc
      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: '**/target/site/apidocs/'
          retention-days: 5

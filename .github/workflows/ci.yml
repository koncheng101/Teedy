name: Teedy CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 21 (Teedy 较新版本可能需要 Java 17 或 21)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. 安装系统级依赖 (这是 Teedy 运行的关键)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 安装 Tesseract (OCR), FFmpeg (视频处理), MediaInfo
          sudo apt-get install -y tesseract-ocr libtesseract-dev ffmpeg mediainfo poppler-utils

      # 4. Maven 构建 (核心修改点)
      - name: Build with Maven
        run: |
          mvn -B clean package javadoc:javadoc \
            -DskipTests=false \
            -Dmaven.test.failure.ignore=true \
            -Dmaven.javadoc.failOnError=false
        # 解释：
        # -B: 批处理模式，日志更清晰
        # package: 编译并打包成 jar/war
        # javadoc:javadoc: 生成文档
        # failure.ignore=true: 即使测试挂了也不要停止流水线，为了拿报告

      # 5. 上传构建产物 (Jar/War)
      - name: Upload JAR Artifacts
        if: always() # 即使前面步骤失败也尝试上传
        uses: actions/upload-artifact@v4
        with:
          name: teedy-jars
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 5

      # 6. 上传测试报告
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*.txt
            **/target/surefire-reports/*.xml
          retention-days: 5

      # 7. 上传 JavaDoc
      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: '**/target/site/apidocs/'
          retention-days: 5
